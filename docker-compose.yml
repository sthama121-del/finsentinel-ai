# FinSentinel AI - Local Docker Compose Stack
# Includes: Core infra + Airflow orchestration layer

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.3
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/finsentinel
    REDIS_URL: redis://redis:6379/0
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    OLLAMA_BASE_URL: http://host.docker.internal:11434
    FINSENTINEL_API_URL: http://finsentinel-api:8000
    LLM_PROVIDER: ollama
    LLM_MODEL: mistral:7b-instruct
    PII_MASKING_ENABLED: "true"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./agents:/opt/airflow/dags/agents
    - ./rag:/opt/airflow/dags/rag
    - ./llm:/opt/airflow/dags/llm
    - ./config:/opt/airflow/dags/config
    - ./security:/opt/airflow/dags/security
    - ./data:/opt/airflow/data
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - finsentinel-net

services:

  # ─── PostgreSQL (Primary Database) ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finsentinel-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsentinel-net

  # ─── Redis (Cache + Session Store) ───────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: finsentinel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsentinel-net

  # ─── Zookeeper (Kafka Dependency) ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: finsentinel-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - finsentinel-net

  # ─── Kafka (Event Streaming) ──────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: finsentinel-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - finsentinel-net

  # ─── Kafka UI (Dev Dashboard) ─────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: finsentinel-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: finsentinel
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - finsentinel-net

  # ─── ChromaDB (Vector Store) ──────────────────────────────────────────────────
  chroma:
    image: chromadb/chroma:0.4.24
    container_name: finsentinel-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/.chroma
    environment:
      - ALLOW_RESET=true
      - ANONYMIZED_TELEMETRY=false
    networks:
      - finsentinel-net

  # ─── Prometheus (Metrics Collector) ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: finsentinel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - finsentinel-net

  # ─── Grafana (Monitoring Dashboards) ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: finsentinel-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - finsentinel-net

  # ─── FinSentinel AI API ───────────────────────────────────────────────────────
  finsentinel-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: finsentinel-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/finsentinel
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - finsentinel-net

  # ─── Airflow: Database Init (runs once) ───────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: finsentinel-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow db upgrade &&
        airflow users create \
          --username admin \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname FinSentinel \
          --lastname Admin \
          --role Admin \
          --email admin@finsentinel.com || true
    restart: on-failure

  # ─── Airflow: Webserver (UI at :8085) ────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: finsentinel-airflow-webserver
    command: webserver
    ports:
      - "8085:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ─── Airflow: Scheduler (runs DAGs) ──────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: finsentinel-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  chroma_data:
  prometheus_data:
  grafana_data:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  finsentinel-net:
    driver: bridge
