global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: finsentinel-ai
    environment: local

scrape_configs:
  - job_name: finsentinel-api
    static_configs:
      - targets: ["finsentinel-api:8002"]
    metrics_path: /metrics

  - job_name: kafka
    static_configs:
      - targets: ["kafka:9101"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres:5432"]

  - job_name: redis
    static_configs:
      - targets: ["redis:6379"]
